# Publishes the app to the gh-pages branch on every push to main.
# GitHub automatically serves the gh-pages branch via GitHub Pages
# (https://kth2.github.io/4D-number-app/). The app lives at the repo
# root, so gh-pages simply mirrors main.

name: Publish to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mirror main to gh-pages
        run: git push origin --force main:gh-pages
