# Temporary diagnostic: inspect 4d2ulive.com structure so we can write a parser.
# Manual trigger only; removed once the scraper works.
name: Probe 4d2ulive

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and inspect
        run: |
          python3 - <<'EOF'
          import urllib.request, re, gzip, io

          UA = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36",
                "Accept-Language": "en", "Accept-Encoding": "gzip"}

          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers=UA)
                  with urllib.request.urlopen(req, timeout=30) as r:
                      raw = r.read()
                      if r.headers.get("Content-Encoding") == "gzip":
                          raw = gzip.GzipFile(fileobj=io.BytesIO(raw)).read()
                      body = raw.decode("utf-8", "replace")
                      print(f"\n===== {url} -> {r.status} {r.headers.get('Content-Type','')} len={len(body)}")
                      return body
              except Exception as e:
                  print(f"\n===== {url} -> ERROR {e}")
                  return ""

          body = fetch("https://4d2ulive.com/")
          if body:
              m = re.search(r"<title[^>]*>(.*?)</title>", body, re.S | re.I)
              print("title:", (m.group(1).strip() if m else "?")[:160])
              # operator keywords present?
              for kw in ["magnum", "damacai", "da ma cai", "toto", "sports toto", "1st", "2nd", "3rd", "special", "consolation", "starter"]:
                  print(f"has '{kw}':", kw.lower() in body.lower())
              # JS-app signals
              print("script tags:", len(re.findall(r"<script", body, re.I)))
              for s in sorted(set(re.findall(r'src="([^"]+\.js[^"]*)"', body, re.I)))[:12]:
                  print("script src:", s[:160])
              # API-ish URLs referenced
              for u in sorted(set(re.findall(r'["\'](https?://[^"\']*(?:api|ajax|json|result|data)[^"\']*)["\']', body, re.I)))[:20]:
                  print("api-ish:", u[:160])
              for u in sorted(set(re.findall(r'(?:fetch|axios\.get|\.load)\(["\']([^"\']+)["\']', body, re.I)))[:20]:
                  print("fetch-call:", u[:160])
              # count 4-digit tokens (server-rendered results?)
              nums = re.findall(r'(?<!\d)(\d{4})(?!\d)', body)
              print("4-digit tokens:", len(nums), nums[:40])
              # dump a window around the first 'magnum' mention
              i = body.lower().find("magnum")
              if i != -1:
                  print("---- context around 'magnum' ----")
                  print(re.sub(r"\s+", " ", body[i-200:i+900]))
          EOF
