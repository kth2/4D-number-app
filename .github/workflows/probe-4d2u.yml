# Temporary: dry-run the 4d2ulive scraper to verify parsing before wiring it
# into the pipeline. Removed once confirmed.
name: Probe 4d2ulive

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install beautifulsoup4
      - name: Dry-run known date (2026-07-12) and today (2026-07-15)
        working-directory: scrapers
        run: |
          echo "===== 2026-07-12 (verify vs known) ====="
          python3 scrape_4d2u.py --dry-run 2026-07-12 2026-07-12
          echo "===== 2026-07-15 (today) ====="
          python3 scrape_4d2u.py --dry-run 2026-07-15 2026-07-15
